<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sign in</title>
    <!-- INCLUDE -->

</head>
  <body class=" bg-black">
    <!--CONTENT-->
    <style>
      .lelement {
        background-color: #000;
        color: #fff;
        transition: filter 0.3s ease;
      }

      .lelement:hover {
        filter: invert(100%);
      }
    </style>
    <div id="wrapper" class="d-flex justify-content-center align-items-center vh-100">
        <img class="position-absolute z-n1 vh-100" src="https://imgs.search.brave.com/PHZCVCbaQaQQnc5UKndpvy0Hgow7KERjKi7VN5x62HE/rs:fit:860:0:0:0/g:ce/aHR0cHM6Ly93YWxs/cGFwZXJhY2Nlc3Mu/Y29tL2Z1bGwvMzU0/OTI0NS5qcGc">
        <<div class="bg-light p-2 rounded shadow position-absolute z-0">
    <div id="msg-nocookie" class="d-none">
        <span class="text-danger"><b>You have not been logged in,</b></span><br>
        as the character you selected is not permitted to access this site.<br><br>
        Redirecting to login page (10s)...
    </div>
    <div id="msg-unauthorized" class="d-none">
        You are logged in. However,<br>
        <span class="text-danger"><b>The current character is not permitted to access this service.</b></span><br><br>
        You may:<br>
        <button onclick= "window.location.href='/logout?' + new URLSearchParams(window.location.search).get('redirect') ? 'redirect=' + new URLSearchParams(window.location.search).get('redirect') : ''">Log out</button> of this session<br>
        <button onclick= "window.location.href='/purge?' + new URLSearchParams(window.location.search).get('redirect') ? 'redirect=' + new URLSearchParams(window.location.search).get('redirect') : ''">Log out all </button> sessions with this character.
    </div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const redirect = params.get('redirect');
    const loginUrl = '/login' + (redirect ? '?redirect=' + redirect : '');

    if (params.get('nocookie') === 'true') {
        document.getElementById('msg-nocookie').classList.remove('d-none');
        setTimeout(() => window.location.href = loginUrl, 10000);
    } else {
        document.getElementById('msg-unauthorized').classList.remove('d-none');
        document.getElementById('msg-unauthorized').querySelector('button').onclick = function() {
            document.cookie = 'evefa_session_token=;expires=Thu, 01 Jan 1970 00:00:00 UTC;path=/';
            window.location.href = loginUrl;
        };
    }
</script>
</div>
    </div>

    <!--END CONTENT-->

</body>
</html>
